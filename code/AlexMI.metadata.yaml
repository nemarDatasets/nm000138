abstract: Motor imagery dataset from the PhD thesis on robust control of an effector via asynchronous EEG brain-machine interface
  (Barachant, 2012). This shared dataset corresponds to Step B (cue-based imagery without feedback) of the Brain Switch campaign.
  Contains recordings from 8 subjects performing 3 motor imagery tasks (right hand, feet, rest) with 20 trials per class.
